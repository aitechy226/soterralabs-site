# Anvil Engine Facts — canonical engine list
#
# Adding / removing an engine = data change, not a code change.
# Mirrors the MLPerf precedent (mlperf_rounds.yaml, mlperf_tracked.yaml).
#
# Schema:
#   engines:
#     - id:               machine-readable engine id; lowercase, hyphenated.
#                         Used as PK in engines table AND as the FK target
#                         for facts.engine_id + extraction_runs.engine_id.
#                         The corresponding Python module under extractors/
#                         may use snake_case (e.g. id 'tensorrt-llm' →
#                         extractors/tensorrt_llm.py), but the subclass's
#                         `engine_id` attribute MUST emit the hyphen form
#                         exactly. There is no auto-conversion; mismatch
#                         fires sqlite3.IntegrityError at fact INSERT.
#       display_name:     human-readable name shown on the page
#       repo_url:         project's canonical GitHub repo URL
#       container_source: registry URL pattern (Docker Hub / GHCR / NGC) — empty string if no published container
#       license:          SPDX identifier (Apache-2.0 / MIT / BSD-3-Clause / etc.) — sourced from project at extract time, this is just a default
#       description:      project's own one-line tagline (overridden by README first-line at extract time)
#
# Order in this file is for human review only. Engines are sorted by
# last_commit_desc at render time (not by YAML order).
#
# V1 = 9 engines. NIM deferred to V3 (NGC TOS gate). Adding new engine
# = append entry here + create scripts/extractors/<id_with_underscores>.py
# + update tests. Verify the subclass's engine_id matches the YAML id
# exactly before INSERT.

engines:
  - id: vllm
    display_name: vLLM
    repo_url: https://github.com/vllm-project/vllm
    container_source: https://hub.docker.com/r/vllm/vllm-openai
    license: Apache-2.0
    description: A high-throughput and memory-efficient inference and serving engine for LLMs

  - id: tensorrt-llm
    display_name: TensorRT-LLM
    repo_url: https://github.com/NVIDIA/TensorRT-LLM
    container_source: https://catalog.ngc.nvidia.com/orgs/nvidia/containers/tritonserver
    license: Apache-2.0
    description: TensorRT-LLM provides users with an easy-to-use Python API to define LLMs

  - id: sglang
    display_name: SGLang
    repo_url: https://github.com/sgl-project/sglang
    container_source: https://hub.docker.com/r/lmsysorg/sglang
    license: Apache-2.0
    description: SGLang is a fast serving framework for large language models and vision language models

  - id: lmdeploy
    display_name: LMDeploy
    repo_url: https://github.com/InternLM/lmdeploy
    container_source: https://hub.docker.com/r/openmmlab/lmdeploy
    license: Apache-2.0
    description: LMDeploy is a toolkit for compressing, deploying, and serving LLMs

  - id: tgi
    display_name: TGI
    repo_url: https://github.com/huggingface/text-generation-inference
    container_source: https://github.com/huggingface/text-generation-inference/pkgs/container/text-generation-inference
    license: Apache-2.0
    description: Large Language Model Text Generation Inference

  - id: mlc-llm
    display_name: MLC-LLM
    repo_url: https://github.com/mlc-ai/mlc-llm
    container_source: ""
    license: Apache-2.0
    description: Universal LLM deployment engine with ML compilation

  - id: llama-cpp
    display_name: llama.cpp
    repo_url: https://github.com/ggml-org/llama.cpp
    container_source: https://github.com/ggml-org/llama.cpp/pkgs/container/llama.cpp
    license: MIT
    description: LLM inference in C/C++

  - id: ollama
    display_name: Ollama
    repo_url: https://github.com/ollama/ollama
    container_source: https://hub.docker.com/r/ollama/ollama
    license: MIT
    description: Get up and running with large language models locally

  - id: deepspeed-mii
    display_name: DeepSpeed-MII
    repo_url: https://github.com/deepspeedai/DeepSpeed-MII
    container_source: ""
    license: Apache-2.0
    description: MII makes low-latency and high-throughput inference possible, powered by DeepSpeed
