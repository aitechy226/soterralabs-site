# MLPerf Inference round registry.
#
# Per architect spec §3.3 and D5: this file is the human-edited round
# registry. The cron pipeline NEVER writes here. New rounds get added
# via deliberate human PR after a schema audit confirms the JSON
# structure of the round's summary_results.json hasn't shifted.
#
# URL pattern resolved 2026-04-27 — see project memory
# `project_anvil_mlperf_url_resolution.md`. The format is JSON (not
# CSV as the original spec assumed). Older rounds (v4.x and below)
# do not publish a summary_results.json at the repo root and are
# deferred — would require directory-walking logic.
#
# When a new round publishes:
#   1. Verify github.com/mlcommons/inference_results_v<N>/main/
#      summary_results.json returns 200
#   2. Inspect first ~10 entries; confirm keys match the v5.x schema
#      (Submitter / Accelerator / Model / Scenario / Performance_Result /
#      Performance_Units / Suite / Category / a# / Accuracy / Details)
#   3. Add entry below with `schema_audited: false`
#   4. Once cron run succeeds against the new round AND a human spot-
#      checks the rendered output, flip to `schema_audited: true`
#   5. Commit the YAML change

rounds:
  - id: v5.0
    results_url: https://raw.githubusercontent.com/mlcommons/inference_results_v5.0/main/summary_results.json
    published_at: "2025-04-02"
    schema_audited: true    # Audited 2026-04-27 — keys verified against parser: Submitter, System, Accelerator, a#, Model, Scenario, Performance_Result, Performance_Units, Suite, Category, Accuracy

  - id: v5.1
    results_url: https://raw.githubusercontent.com/mlcommons/inference_results_v5.1/main/summary_results.json
    published_at: "2025-09-09"
    schema_audited: true    # Audited 2026-04-27 — same keys as v5.0; new scenario "Interactive" not in tracked.yaml so naturally filtered out
