name: anvil-weekly-engine-facts

# Hardened against the workflow-injection class flagged by GitHub's
# security guide: only `secrets.*` interpolation (auto-masked); no
# untrusted user input (github.event.*) reaches any `run:` block.
# Mirrors the established weekly-mlperf.yml + daily-pricing.yml shape.

on:
  schedule:
    # Mondays at 06:00 UTC — runs ahead of weekly-mlperf (07:00 UTC) so
    # the two crons don't contend for the commit lock. Engine Facts
    # makes ~90 GitHub API calls per run (9 engines × ~10 calls);
    # ample headroom under the 5000/hr authenticated quota.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

# Distinct concurrency group from pricing/mlperf — independent state file
# (engine_facts.sqlite) and independent failure modes.
concurrency:
  group: anvil-engine-facts-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  extract-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Anvil deps
        working-directory: anvil
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Extract Engine Facts (9 engines x 24 fact_types)
        working-directory: anvil
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_TOKEN:   ${{ secrets.DOCKERHUB_TOKEN }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          ALERT_TO:          ${{ secrets.ALERT_TO }}
          ALERT_FROM:        ${{ secrets.ALERT_FROM }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        # extract_all_engines.main() returns exit code 1 if ANY engine
        # failed extraction. We DO NOT block the workflow on that —
        # the orchestrator already wrote a 'failed' audit row + the
        # render layer surfaces the 'last run failed' badge per Mara's
        # Wave 1E.2 copy + notify.alert fired. Cron should commit the
        # partial DB so the buyer sees what we have rather than a stale
        # full snapshot. `|| true` accepts the partial-success exit code;
        # the alert email is the operational signal.
        run: python -m scripts.extract_all_engines || true

      - name: Render Anvil pages
        run: python -m render.anvil.build

      - name: Commit re-rendered HTML if changed
        run: |
          git config user.name  "anvil-cron[bot]"
          git config user.email "anvil-cron@users.noreply.github.com"
          git add anvil/data/engine_facts.sqlite \
                  anvil/index.html \
                  anvil/engines/index.html \
                  anvil/style.css 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No HTML changes to commit."
          else
            git commit -m "anvil cron: refresh engine-facts $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main
          fi
