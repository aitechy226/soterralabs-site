name: anvil-daily-pricing

# Hardened against the workflow-injection class flagged by
# GitHub's security guide: this file uses only `secrets.*`
# expressions (auto-masked) and `github.repository`-style
# constants. NO untrusted user input (issue titles, PR bodies,
# commit messages, head_ref, etc.) is interpolated into any
# `run:` block, so the standard injection vectors don't apply.

on:
  schedule:
    # Daily at 06:00 UTC. STALE_THRESHOLD_HOURS=36 means a single
    # missed cycle gets a banner; two missed cycles is a 60h-old page.
    - cron: '0 6 * * *'
  workflow_dispatch: {}   # Manual fire-anytime button in Actions UI

# One run at a time; queue rather than overlap (fetchers + commit
# would race on pricing.sqlite + the rendered HTML).
concurrency:
  group: anvil-pricing-write
  cancel-in-progress: false

permissions:
  contents: write   # Need to commit re-rendered HTML back to main

jobs:
  fetch-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Anvil deps
        working-directory: anvil
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Fetch AWS pricing
        working-directory: anvil
        env:
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          ALERT_TO:          ${{ secrets.ALERT_TO }}
          ALERT_FROM:        ${{ secrets.ALERT_FROM }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m scripts.fetch_aws_pricing

      - name: Fetch Azure pricing
        working-directory: anvil
        env:
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          ALERT_TO:          ${{ secrets.ALERT_TO }}
          ALERT_FROM:        ${{ secrets.ALERT_FROM }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m scripts.fetch_azure_pricing

      - name: Fetch GCP pricing (skipped if GCP_API_KEY absent)
        working-directory: anvil
        env:
          GCP_API_KEY:       ${{ secrets.GCP_API_KEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          ALERT_TO:          ${{ secrets.ALERT_TO }}
          ALERT_FROM:        ${{ secrets.ALERT_FROM }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$GCP_API_KEY" ]; then
            echo "::warning::GCP_API_KEY not set; skipping GCP fetch."
            exit 0
          fi
          python -m scripts.fetch_gcp_pricing

      - name: Render Anvil pages
        run: python -m render.anvil.build

      - name: Commit re-rendered HTML if changed
        run: |
          git config user.name  "anvil-cron[bot]"
          git config user.email "anvil-cron@users.noreply.github.com"
          git add anvil/index.html anvil/pricing/index.html anvil/mlperf/index.html anvil/style.css 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No HTML changes to commit."
          else
            git commit -m "anvil cron: refresh pricing $(date -u +%Y-%m-%d)"
            git push origin main
          fi
