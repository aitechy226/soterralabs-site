<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 50" fill="none">
  <!--
    Soterra Labs — wordmark with apex dot
    Base: logo.svg (unchanged)
    Added: proportional circle at the top of the stack — everything lights up.
  -->

  <defs>
    <filter id="dot-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── MARK (base — logo.svg) ── -->

  <!-- Layer 1 — top -->
  <polygon points="20,5 29,9.5 20,14 11,9.5"       fill="#93c5fd"/>
  <polygon points="11,9.5 20,14 20,17 11,12.5"      fill="#60a5fa"/>
  <polygon points="29,9.5 20,14 20,17 29,12.5"      fill="#3b82f6"/>

  <!-- Layer 2 — middle (touching layer 1) -->
  <polygon points="20,17 31,22 20,27 9,22"          fill="#60a5fa"/>
  <polygon points="9,22 20,27 20,30 9,25"           fill="#3b82f6"/>
  <polygon points="31,22 20,27 20,30 31,25"         fill="#2563eb"/>

  <!-- Layer 3 — bottom (touching layer 2) -->
  <polygon points="20,30 36,36 20,42 4,36"          fill="#3b82f6"/>
  <polygon points="4,36 20,42 20,45 4,39"           fill="#2563eb"/>
  <polygon points="36,36 20,42 20,45 36,39"         fill="#1d4ed8"/>

  <!-- ── APEX DOT — everything lights up ── -->
  <g filter="url(#dot-glow)">
    <circle cx="20" cy="2" r="2.5" fill="#4ade80"/>
  </g>

  <!-- ── WORDMARK ── -->

  <text x="42" y="30"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" letter-spacing="2.5"
    fill="#111827">SOTERRA LABS</text>

  <line x1="238" y1="12" x2="238" y2="34" stroke="#d1d5db" stroke-width="1"/>

  <text x="246" y="30"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" letter-spacing="2.5"
    fill="#4ade80">AI</text>

</svg>
